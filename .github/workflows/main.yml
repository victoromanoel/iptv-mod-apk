name: Build APK - IPTV Pro Player TV

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build APK
        working-directory: iptv-tv-apk-project/iptv-tv-apk
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: IPTV-Pro-Player-TV-APK
          path: iptv-tv-apk-project/iptv-tv-apk/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
