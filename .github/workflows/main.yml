name: Build APK

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Verificar estrutura
        run: |
          echo "=== Arquivos na raiz ==="
          ls -la
          echo "=== Buscando build.gradle ==="
          find . -name "build.gradle" 2>/dev/null
          echo "=== Buscando gradlew ==="
          find . -name "gradlew" 2>/dev/null

      - name: Build APK
        run: |
          cd iptv-tv-apk-project/iptv-tv-apk
          ls -la
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: APK-TV
          path: |
            iptv-tv-apk-project/iptv-tv-apk/app/build/outputs/apk/debug/*.apk
