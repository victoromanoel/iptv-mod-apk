name: Build APK

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Listar estrutura do projeto
        run: find . -maxdepth 5 -name "*.gradle" -o -name "gradlew" | sort

      - name: Build APK
        run: |
          cd iptv-tv-apk-project/iptv-tv-apk
          chmod +x gradlew
          ./gradlew assembleDebug --stacktrace --info 2>&1 | tail -100

      - uses: actions/upload-artifact@v4
        if: success()
        with:
          name: APK-TV
          path: iptv-tv-apk-project/iptv-tv-apk/app/build/outputs/apk/debug/app-debug.apk
