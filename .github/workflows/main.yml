name: Build APK

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Instalar Gradle 8.4
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.4'

      - name: Listar arquivos do projeto
        run: |
          echo "=== Raiz ==="
          ls -la
          echo "=== Subpastas ==="
          find . -name "build.gradle" | sort

      - name: Build APK
        run: |
          cd iptv-tv-apk-project/iptv-tv-apk
          gradle assembleDebug --no-daemon --stacktrace

      - name: Listar APKs gerados
        run: find . -name "*.apk" 2>/dev/null || echo "Nenhum APK encontrado"

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: APK-TV
          path: "**/*.apk"
          if-no-files-found: warn
